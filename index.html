<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數字大師 - Senior Rummy Master</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #FFCC00; --blue: #007AFF; }
        body { margin: 0; background-color: var(--bg); font-family: sans-serif; color: var(--text); overflow: hidden; touch-action: manipulation; }
        #root { height: 100vh; display: flex; flex-direction: column; }
        
        /* Profile Management */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .profile-card { background: #222; width: 90%; padding: 20px; margin: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 3px solid #444; }
        .btn-big { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .btn-del { background: #ff3b30; color: white; padding: 10px; border-radius: 5px; border: none; }
        .input-big { font-size: 24px; padding: 15px; width: 80%; border-radius: 10px; margin-bottom: 20px; border: none; }

        /* Stats & Header */
        .stats-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: #1a1a1a; border-bottom: 2px solid #333; height: 60px; align-items: center; }
        .rank-box { color: var(--accent); font-size: 18px; font-weight: bold; }
        .best-box { color: #4cd964; font-size: 16px; text-align: right; }

        /* Game UI */
        .instruction { font-size: 24px; text-align: center; padding: 10px; font-weight: bold; min-height: 40px; color: var(--blue); background: #fff; margin: 5px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; flex-grow: 1; align-content: start; }
        .tile { height: 100px; border-radius: 12px; border: 4px solid #fff; font-size: 50px; font-weight: 900; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; }
        
        /* Selection Slots */
        .slots { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #111; height: 100px; }
        .slot { width: 70px; height: 90px; border: 2px dashed #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        
        /* Footer Controls */
        .controls { display: flex; flexDirection: column; padding: 10px; gap: 5px; background: #000; }
        .draw-btn { background: #5856d6; color: white; border: none; width: 100%; padding: 15px; font-size: 26px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .exit-btn { background: none; color: #666; border: none; padding: 5px; font-size: 16px; align-self: center; }

        /* Success Popup */
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 30px; border-radius: 20px; text-align: center; z-index: 200; width: 80%; border: 8px solid var(--accent); box-shadow: 0 0 50px rgba(255,204,0,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const COLORS = ['#FF3B30', '#FFCC00', '#007AFF', '#555555']; 
        const RANKS = ["新手", "入門生", "數字達人", "魔力橋大師", "傳奇至尊"];

        function App() {
            const [user, setUser] = useState(null);
            const [profiles, setProfiles] = useState(JSON.parse(localStorage.getItem('profiles') || '[]'));
            const [pool, setPool] = useState([]);
            const [selected, setSelected] = useState([]);
            const [msg, setMsg] = useState("");
            const [rounds, setRounds] = useState(0);
            const [showMilestone, setShowMilestone] = useState(false);

            useEffect(() => { if (user) startNewGame(); }, [user]);

            const generateTile = () => ({
                id: Math.random(),
                num: Math.floor(Math.random() * 9) + 1,
                col: COLORS[Math.floor(Math.random() * COLORS.length)]
            });

            const generateWinningSet = () => {
                const isRun = Math.random() > 0.5;
                if (isRun) {
                    const startNum = Math.floor(Math.random() * 7) + 1;
                    const col = COLORS[Math.floor(Math.random() * COLORS.length)];
                    return [
                        { id: Math.random(), num: startNum, col },
                        { id: Math.random(), num: startNum + 1, col },
                        { id: Math.random(), num: startNum + 2, col }
                    ];
                } else {
                    const num = Math.floor(Math.random() * 9) + 1;
                    const shuffledCols = [...COLORS].sort(() => 0.5 - Math.random());
                    return [
                        { id: Math.random(), num, col: shuffledCols[0] },
                        { id: Math.random(), num, col: shuffledCols[1] },
                        { id: Math.random(), num, col: shuffledCols[2] }
                    ];
                }
            };

            const startNewGame = () => {
                // Guaranteed win set + 6 random tiles = 9 tiles total
                const winSet = generateWinningSet();
                const randomTiles = Array.from({ length: 6 }, generateTile);
                setPool([...winSet, ...randomTiles].sort(() => 0.5 - Math.random()));
                setSelected([]);
                setMsg("搵 3 粒：同色順序 或 唔同色同字");
            };

            const drawCardsManual = () => {
                // Manually add 3 tiles only when user asks
                if (pool.length >= 12) {
                    setMsg("畫面牌太多喇，試下搵答案！");
                    return;
                }
                const extra = Array.from({ length: 3 }, generateTile);
                setPool([...pool, ...extra]);
                setMsg("已加 3 粒新牌！");
            };

            const checkWin = (set) => {
                const sorted = [...set].sort((a, b) => a.num - b.num);
                const isRun = sorted.every(t => t.col === sorted[0].col) && 
                              (sorted[1].num === sorted[0].num + 1 && sorted[2].num === sorted[1].num + 1);
                const colors = new Set(set.map(t => t.col));
                const isGroup = set.every(t => t.num === set[0].num) && colors.size === 3;
                return isRun || isGroup;
            };

            const handleTileClick = (t) => {
                if (selected.find(s => s.id === t.id)) return;
                const next = [...selected, t];
                setSelected(next);

                if (next.length === 3) {
                    if (checkWin(next)) {
                        setMsg("🎉 啱晒！好叻呀！");
                        updateScore(10);
                        const nextRounds = rounds + 1;
                        setRounds(nextRounds);
                        if (nextRounds > 0 && nextRounds % 10 === 0) setShowMilestone(true);
                        setTimeout(startNewGame, 1500);
                    } else {
                        setMsg("❌ 唔係呢個，再試下");
                        setTimeout(() => setSelected([]), 1000);
                    }
                }
            };

            const updateScore = (pts) => {
                const updated = profiles.map(p => {
                    if (p.name === user.name) {
                        const s = p.score + pts;
                        return { ...p, score: s, best: Math.max(p.best || 0, s) };
                    }
                    return p;
                });
                setProfiles(updated);
                localStorage.setItem('profiles', JSON.stringify(updated));
                setUser(updated.find(p => p.name === user.name));
            };

            if (!user) {
                return (
                    <div className="overlay">
                        <h1 style={{fontSize: '32px', margin: '30px 0'}}>請選擇名字</h1>
                        {profiles.map(p => (
                            <div key={p.name} className="profile-card">
                                <div onClick={() => setUser(p)} style={{fontSize: '26px', flexGrow: 1, fontWeight: 'bold'}}>{p.name}</div>
                                <button className="btn-del" onClick={() => {
                                    const filtered = profiles.filter(x => x.name !== p.name);
                                    setProfiles(filtered);
                                    localStorage.setItem('profiles', JSON.stringify(filtered));
                                }}>刪除</button>
                            </div>
                        ))}
                        <div style={{marginTop: '20px', width: '90%', textAlign: 'center'}}>
                            <input id="n" className="input-big" placeholder="新玩家名字" />
                            <button className="btn-big" style={{width: '100%'}} onClick={() => {
                                const v = document.getElementById('n').value;
                                if(v) { 
                                    const newList = [...profiles, {name: v, score: 0, best: 0}];
                                    setProfiles(newList);
                                    localStorage.setItem('profiles', JSON.stringify(newList));
                                    document.getElementById('n').value=''; 
                                }
                            }}>新增名字</button>
                        </div>
                    </div>
                );
            }

            return (
                <React.Fragment>
                    <div className="stats-bar">
                        <div className="rank-box">
                            {user.name} ({RANKS[Math.min(Math.floor(user.score/50), 4)]})
                        </div>
                        <div className="best-box">最高: {user.best} | 分數: {user.score}</div>
                    </div>

                    <div className="instruction">{msg}</div>

                    <div className="grid">
                        {pool.map(t => (
                            <div key={t.id} onClick={() => handleTileClick(t)} className="tile" 
                                 style={{ backgroundColor: t.col, opacity: selected.find(s => s.id === t.id) ? 0.2 : 1 }}>
                                {t.num}
                            </div>
                        ))}
                    </div>

                    <div className="slots">
                        {[0, 1, 2].map(i => (
                            <div key={i} className="slot">
                                {selected[i] && <div className="tile" style={{backgroundColor: selected[i].col, height: '80px', width: '60px', fontSize: '35px', border: '2px solid white'}}>{selected[i].num}</div>}
                            </div>
                        ))}
                    </div>

                    <div className="controls">
                        <button className="draw-btn" onClick={drawCardsManual}>找不到組合？加牌</button>
                        <button className="exit-btn" onClick={() => setUser(null)}>切換玩家 / 離開</button>
                    </div>

                    {showMilestone && (
                        <div className="popup" onClick={() => setShowMilestone(false)}>
                            <h2 style={{fontSize: '32px', color: '#4cd964'}}>🎉 恭喜晒！</h2>
                            <p style={{fontSize: '22px'}}>你今日已經玩咗 10 局喇！</p>
                            <p style={{fontSize: '22px', fontWeight: 'bold'}}>好叻呀，休息下再玩？</p>
                            <button className="btn-big" style={{marginTop: '15px', width: '100%'}}>繼續玩</button>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
