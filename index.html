<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數字大師 - Senior Rummy Master</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #FFCC00; }
        body { margin: 0; background-color: var(--bg); font-family: 'Microsoft JhengHei', sans-serif; color: var(--text); overflow: hidden; touch-action: none; }
        #root { height: 100vh; display: flex; flex-direction: column; }
        
        /* Profile Screen */
        .overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .profile-card { background: #222; width: 90%; padding: 20px; margin: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 3px solid #444; }
        .btn-big { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .btn-del { background: #ff3b30; color: white; padding: 10px; border-radius: 5px; border: none; }
        .input-big { font-size: 24px; padding: 10px; width: 70%; border-radius: 10px; margin-bottom: 20px; }

        /* Game Header */
        .stats-bar { display: flex; justify-content: space-between; padding: 15px; background: #1a1a1a; border-bottom: 2px solid #333; }
        .rank-box { color: var(--accent); font-size: 20px; font-weight: bold; }
        .best-box { color: #4cd964; font-size: 18px; }

        /* Game Elements */
        .instruction { font-size: 28px; text-align: center; padding: 15px; font-weight: bold; min-height: 80px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; flex-grow: 1; }
        .tile { height: 120px; border-radius: 12px; border: 5px solid #fff; font-size: 60px; font-weight: 900; display: flex; align-items: center; justify-content: center; position: relative; }
        .slots { display: flex; justify-content: center; gap: 10px; padding: 20px; background: #111; }
        .slot { width: 70px; height: 100px; border: 3px dashed #444; border-radius: 8px; }
        .draw-btn { background: #5856d6; color: white; border: none; width: 90%; align-self: center; padding: 20px; font-size: 30px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; }
        
        /* Popup */
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 40px; border-radius: 20px; text-align: center; z-index: 200; width: 80%; border: 10px solid var(--accent); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const COLORS = ['#FF3B30', '#FFCC00', '#007AFF', '#FFFFFF']; // 紅, 黃, 藍, 白
        const RANKS = ["新手", "入門生", "數字達人", "魔力橋大師", "傳奇至尊"];

        function App() {
            const [user, setUser] = useState(null);
            const [profiles, setProfiles] = useState(JSON.parse(localStorage.getItem('profiles') || '[]'));
            const [pool, setPool] = useState([]);
            const [selected, setSelected] = useState([]);
            const [msg, setMsg] = useState("");
            const [rounds, setRounds] = useState(0);
            const [showMilestone, setShowMilestone] = useState(false);

            useEffect(() => {
                if (user) {
                    generateInitialPool();
                    setMsg("揀 3 粒：同色順序 或 不同色同字");
                }
            }, [user]);

            const saveProfiles = (newProfiles) => {
                setProfiles(newProfiles);
                localStorage.setItem('profiles', JSON.stringify(newProfiles));
            };

            const createProfile = (name) => {
                if (!name) return;
                const newP = { name, score: 0, best: 0 };
                saveProfiles([...profiles, newP]);
            };

            const updateScore = (points) => {
                const updated = profiles.map(p => {
                    if (p.name === user.name) {
                        const newScore = p.score + points;
                        const newBest = Math.max(p.best, newScore);
                        return { ...p, score: newScore, best: newBest };
                    }
                    return p;
                });
                saveProfiles(updated);
                setUser(updated.find(p => p.name === user.name));
            };

            const generateTile = () => ({
                id: Math.random(),
                num: Math.floor(Math.random() * 9) + 1,
                col: COLORS[Math.floor(Math.random() * COLORS.length)]
            });

            const generateInitialPool = () => setPool(Array.from({ length: 6 }, generateTile));

            const drawCard = () => {
                if (pool.length >= 9) return;
                setPool([...pool, generateTile()]);
                setMsg("已抽新牌！");
            };

            const checkWin = (set) => {
                const sorted = [...set].sort((a, b) => a.num - b.num);
                // Rule 1: Same Color, Continuous Number (Run)
                const isRun = sorted.every(t => t.col === sorted[0].col) && 
                              (sorted[1].num === sorted[0].num + 1 && sorted[2].num === sorted[1].num + 1);
                // Rule 2: Same Number, Different Colors (Group)
                const colors = new Set(set.map(t => t.col));
                const isGroup = set.every(t => t.num === set[0].num) && colors.size === 3;
                
                return isRun || isGroup;
            };

            const handleTileClick = (t) => {
                if (selected.find(s => s.id === t.id)) return;
                const next = [...selected, t];
                setSelected(next);

                if (next.length === 3) {
                    if (checkWin(next)) {
                        setMsg("🎉 太勁喇！加 10 分！");
                        updateScore(10);
                        const nextRounds = rounds + 1;
                        setRounds(nextRounds);
                        if (nextRounds % 10 === 0) setShowMilestone(true);
                        
                        setTimeout(() => {
                            setPool(pool.filter(p => !next.find(n => n.id === p.id)));
                            setSelected([]);
                            if (pool.length < 6) generateInitialPool();
                            setMsg("繼續加油！");
                        }, 1000);
                    } else {
                        setMsg("❌ 唔係呢個組合，再試下");
                        setTimeout(() => setSelected([]), 1000);
                    }
                }
            };

            const getRank = (score) => RANKS[Math.min(Math.floor(score / 50), RANKS.length - 1)];

            if (!user) {
                return (
                    <div className="overlay">
                        <h1 style={{fontSize: '40px'}}>選取你的名字</h1>
                        {profiles.map(p => (
                            <div key={p.name} className="profile-card">
                                <div onClick={() => setUser(p)} style={{fontSize: '30px', flexGrow: 1}}>{p.name}</div>
                                <button className="btn-del" onClick={() => saveProfiles(profiles.filter(x => x.name !== p.name))}>刪除</button>
                            </div>
                        ))}
                        <div style={{marginTop: '20px', width: '90%'}}>
                            <input id="newName" className="input-big" placeholder="輸入新名字" />
                            <button className="btn-big" onClick={() => {
                                const val = document.getElementById('newName').value;
                                createProfile(val);
                                document.getElementById('newName').value = '';
                            }}>新增用戶</button>
                        </div>
                    </div>
                );
            }

            return (
                <div id="root">
                    <div className="stats-bar">
                        <div className="rank-box">
                            <div>{user.name}: {user.score} 分</div>
                            <div style={{fontSize: '14px'}}>稱號: {getRank(user.score)}</div>
                        </div>
                        <div className="best-box">最高紀錄: {user.best}</div>
                    </div>

                    <div className="instruction">{msg}</div>

                    <div className="grid">
                        {pool.map(t => (
                            <div key={t.id} onClick={() => handleTileClick(t)} className="tile" 
                                 style={{ backgroundColor: t.col, opacity: selected.find(s => s.id === t.id) ? 0.2 : 1 }}>
                                {t.num}
                            </div>
                        ))}
                    </div>

                    <div className="slots">
                        {[0, 1, 2].map(i => (
                            <div key={i} className="slot">
                                {selected[i] && <div className="tile" style={{backgroundColor: selected[i].col, height: '100%', fontSize: '40px', border: '2px solid white'}}>{selected[i].num}</div>}
                            </div>
                        ))}
                    </div>

                    <button className="draw-btn" onClick={drawCard}>➕ 拎多一粒牌</button>
                    <button onClick={() => setUser(null)} style={{background: 'none', color: '#555', border: 'none', marginBottom: '10px'}}>切換用戶</button>

                    {showMilestone && (
                        <div className="popup" onClick={() => setShowMilestone(false)}>
                            <h2>恭喜你！</h2>
                            <p style={{fontSize: '24px'}}>你已經完成咗 10 圈遊戲！</p>
                            <p style={{fontSize: '24px'}}>你做得好好，繼續努力！</p>
                            <button className="btn-big">繼續玩</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
